<span class="line">180</span><br><span class="line">181</span><br><span class="line">182</span><br><span class="line">183</span><br><span class="line">184</span><br><span class="line">185</span><br><span class="line">186</span><br><span class="line">187</span><br><span class="line">188</span><br><span class="line">189</span><br><span class="line">190</span><br><span class="line">191</span><br><span class="line">192</span><br><span class="line">193</span><br><span class="line">194</span><br><span class="line">195</span><br><span class="line">196</span><br><span class="line">197</span><br><span class="line">198</span><br><span class="line">199</span><br><span class="line">200</span><br><span class="line">201</span><br><span class="line">202</span><br><span class="line">203</span><br><span class="line">204</span><br><span class="line">205</span><br><span class="line">206</span><br><span class="line">207</span><br><span class="line">208</span><br><span class="line">209</span><br><span class="line">210</span><br><span class="line">211</span><br><span class="line">212</span><br><span class="line">213</span><br><span class="line">214</span><br><span class="line">215</span><br><span class="line">216</span><br><span class="line">217</span><br><span class="line">218</span><br><span class="line">219</span><br><span class="line">220</span><br><span class="line">221</span><br><span class="line">222</span><br><span class="line">223</span><br><span class="line">224</span><br><span class="line">225</span><br><span class="line">226</span><br><span class="line">227</span><br><span class="line">228</span><br><span class="line">229</span><br><span class="line">230</span><br><span class="line">231</span><br><span class="line">232</span><br><span class="line">233</span><br><span class="line">234</span><br><span class="line">235</span><br><span class="line">236</span><br><span class="line">237</span><br><span class="line">238</span><br><span class="line">239</span><br><span class="line">240</span><br><span class="line">241</span><br><span class="line">242</span><br><span class="line">243</span><br><span class="line">244</span><br><span class="line">245</span><br><span class="line">246</span><br><span class="line">247</span><br><span class="line">248</span><br><span class="line">249</span><br><span class="line">250</span><br><span class="line">251</span><br><span class="line">252</span><br><span class="line">253</span><br><span class="line">254</span><br><span class="line">255</span><br><span class="line">256</span><br><span class="line">257</span><br><span class="line">258</span><br><span class="line">259</span><br><span class="line">260</span><br><span class="line">261</span><br><span class="line">262</span><br><span class="line">263</span><br><span class="line">264</span><br><span class="line">265</span><br></pre></td><td class="code"><pre><code class="hljs bash"><span class="hljs-comment"># Redis configuration file example.</span><br><br><span class="hljs-comment"># 启动时指定配置文件</span><br><span class="hljs-comment"># ./redis-server /path/to/redis.conf</span><br><br><span class="hljs-comment">################################## NETWORK 网络 ####################################</span><br><br><span class="hljs-comment"># 绑定主机地址</span><br><span class="hljs-built_in">bind</span> 127.0.0.1<br><br><span class="hljs-comment"># 保护模式，默认开启</span><br>protected-mode <span class="hljs-built_in">yes</span><br><br><span class="hljs-comment"># 监听端口号，默认为6379，设置为0，则不监听任何端口</span><br>port 6379<br><br><span class="hljs-comment"># TCP 监听的最大容纳数量，默认511</span><br>Linux需要修改 /proc/sys/net/core/somaxconn 对应的值<br>tcp-backlog 511<br><br><span class="hljs-comment"># 制定 Unix socket 的路径</span><br><span class="hljs-comment"># unixsocket /tmp/redis.sock</span><br><span class="hljs-comment"># unixsocketperm 700</span><br><br><span class="hljs-comment"># 当客户端闲置多少秒后关闭连接，0代表关闭该功能</span><br><span class="hljs-built_in">timeout</span> 0<br><br><span class="hljs-comment"># TCP keepalive 心跳包</span><br><span class="hljs-comment"># Redis 3.2.1 之后版本推荐设置为300秒</span><br>tcp-keepalive 300<br><br><span class="hljs-comment">################################# GENERAL 通用 #####################################</span><br><br><span class="hljs-comment"># Redis默认不是以守护进程的方式运行的，yes启动守护进程</span><br>daemonize no<br><br><span class="hljs-comment"># 监控管理守护进程，no、upstart、systemd、no，默认no</span><br>supervised no<br><br><span class="hljs-comment"># Redis以守护进程方式运行时，Redis默认会把pid写入 /var/run/redis.pid 文件，</span><br>pidfile /var/run/redis_6379.pid<br><br><span class="hljs-comment"># 定义日志级别</span><br><span class="hljs-comment"># debug     适用于开发或测试阶段</span><br><span class="hljs-comment"># verbose   日志数量少于debug</span><br><span class="hljs-comment"># notice    适用于生产环境，默认级别</span><br><span class="hljs-comment"># warning   仅仅一些重要的消息被记录</span><br>loglevel notice<br><br><span class="hljs-comment"># 指定日志文件的位置</span><br>logfile <span class="hljs-string">&quot;&quot;</span><br><br><span class="hljs-comment"># 是否把日志记录到系统日志，默认no</span><br><span class="hljs-comment"># syslog-enabled no</span><br><br><span class="hljs-comment"># 设置 syslog 的 identity</span><br><span class="hljs-comment"># syslog-ident redis</span><br><br><span class="hljs-comment"># 设置 syslog 的 facility，必须是 USER 或者是 LOCAL0-LOCAL7 之间的值</span><br><span class="hljs-comment"># syslog-facility local0</span><br><br><span class="hljs-comment"># 设置数据库的数量</span><br>databases 16<br><br><span class="hljs-comment"># 控制台展示redis logo</span><br>always-show-logo <span class="hljs-built_in">yes</span><br><br><span class="hljs-comment">################################ SNAPSHOTTING 快照  ################################</span><br><span class="hljs-comment">#</span><br><span class="hljs-comment"># 保存数据到磁盘：</span><br><span class="hljs-comment"># Save the DB on disk:</span><br><span class="hljs-comment">#</span><br><span class="hljs-comment">#   格式：save &lt;seconds&gt; &lt;changes&gt;</span><br><span class="hljs-comment">#   根据给定的时间间隔和写入次数将数据保存到磁盘</span><br><span class="hljs-comment">#</span><br><span class="hljs-comment">#   下面的例子的意思是：</span><br><span class="hljs-comment">#     900 秒后如果至少有 1 个 key 的值变化，则保存</span><br><span class="hljs-comment">#     300 秒后如果至少有 10 个 key 的值变化，则保存</span><br><span class="hljs-comment">#     60  秒后如果至少有 10000 个 key 的值变化，则保存</span><br><span class="hljs-comment">#</span><br><span class="hljs-comment">#   注意：注释掉所有的 save 可停用保存功能。也可以直接一个空字符串来实现停用：</span><br><span class="hljs-comment">#   save &quot;&quot;</span><br>save 900 1<br>save 300 10<br>save 60 10000<br><br><span class="hljs-comment"># 持久化失败后, 是否继续工作</span><br>stop-writes-on-bgsave-error <span class="hljs-built_in">yes</span><br><br><span class="hljs-comment"># dump.rdb 文件是否使用 LZF 压缩，默认为 yes</span><br>rdbcompression <span class="hljs-built_in">yes</span><br><br><span class="hljs-comment"># 是否校验rdb文件</span><br>rdbchecksum <span class="hljs-built_in">yes</span><br><br><span class="hljs-comment"># 设置 dump 的文件名称</span><br>dbfilename dump.rdb<br><br><span class="hljs-comment"># RDB 文件是否删除同步锁</span><br><span class="hljs-comment"># 仅在同时禁用 AOF 和 RDB 的实例中起作用，否则将被完全忽略。</span><br>rdb-del-sync-files no<br><br><span class="hljs-comment"># 制定 rdb 存放目录，上面的 dbfilename 只指定了文件名。这个配置项必须是目录，而不能是文件名。</span><br><span class="hljs-built_in">dir</span> ./<br><br><span class="hljs-comment">################################# REPLICATION 从复制节点 #################################</span><br><br><span class="hljs-comment"># 从节点配置</span><br><span class="hljs-comment"># Redis 5.0 以前的版本使用 slaveof 配置从节点</span><br><span class="hljs-comment"># slaveof &lt;masterip&gt; &lt;masterport&gt;</span><br><span class="hljs-comment">#</span><br><span class="hljs-comment"># Redis 5.0 以后的版本建议使用此配置</span><br><span class="hljs-comment"># replicaof &lt;masterip&gt; &lt;masterport&gt;</span><br><br><span class="hljs-comment"># 如果主节点配置了认证，需要添加用户名、密码</span><br><span class="hljs-comment"># masteruser &lt;username&gt;</span><br><span class="hljs-comment"># masterauth &lt;master-password&gt;</span><br><br><span class="hljs-comment"># 从节点是否可以相应客户端请求，默认：yes</span><br>replica-serve-stale-data <span class="hljs-built_in">yes</span><br><br><span class="hljs-comment"># 从节点只读</span><br>replica-read-only <span class="hljs-built_in">yes</span><br><br><span class="hljs-comment"># 是否使用无盘复制</span><br>repl-diskless-sync no<br>repl-diskless-sync-delay 5<br><br><span class="hljs-comment"># RDB无盘加载</span><br><span class="hljs-comment"># &quot;disabled&quot;    - 不要使用无盘负载（首先将rdb文件存储到磁盘）</span><br><span class="hljs-comment"># &quot;on-empty-db&quot; - 仅在完全安全时才使用无盘加载</span><br><span class="hljs-comment"># &quot;swapdb&quot;      - 解析时在RAM中保留当前数据库内容的副本直接从套接字获取数据</span><br>repl-diskless-load disabled<br><br><span class="hljs-comment"># 主节点每隔一段固定的时间向从节点发送一个PING命令</span><br><span class="hljs-comment"># repl-ping-replica-period 10</span><br><br><span class="hljs-comment"># 复制超时时间，单位：秒</span><br><span class="hljs-comment"># repl-timeout 60</span><br><br><span class="hljs-comment"># 是否禁用 TCP_NODELAY 网络延迟，no不禁用，yes禁用</span><br>repl-disable-tcp-nodelay no<br><br><span class="hljs-comment"># 复制积累缓冲区大小</span><br><span class="hljs-comment"># repl-backlog-size 1mb</span><br><br><span class="hljs-comment"># 主服务器与从服务器断开多长时间，释放缓冲区，单位：秒，0表示从不释放积压</span><br><span class="hljs-comment"># repl-backlog-ttl 3600</span><br><br><span class="hljs-comment"># 从服务器晋升为主服务器的优先级，取值：0~100，值越小优先级越高，默认100</span><br>replica-priority 100<br><br><span class="hljs-comment"># 最小3个可写的从节点，默认0，禁用此功能</span><br><span class="hljs-comment"># min-replicas-to-write 3</span><br><span class="hljs-comment"># 最小从节点的最大延迟为10秒</span><br><span class="hljs-comment"># min-replicas-max-lag 10</span><br><br><span class="hljs-comment"># 从节点对外暴露ip</span><br><span class="hljs-comment"># replica-announce-ip 5.5.5.5</span><br><span class="hljs-comment"># 从节点对外暴露端口</span><br><span class="hljs-comment"># replica-announce-port 1234</span><br><br><span class="hljs-comment">################################## SECURITY 安全 ###################################</span><br><br><span class="hljs-comment"># 设置密码，默认无</span><br><span class="hljs-comment"># requirepass 123456</span><br><br><span class="hljs-comment">############################ MEMORY MANAGEMENT 内存管理 ##############################</span><br><br><span class="hljs-comment"># 最大内存限制</span><br><span class="hljs-comment"># maxmemory &lt;bytes&gt;</span><br><br><span class="hljs-comment"># 最大内存策略：如果达到内存限制了，Redis如何选择删除key。</span><br><span class="hljs-comment">#</span><br><span class="hljs-comment"># volatile-lru    -&gt; 根据 LRU 算法删除设置过期时间的key</span><br><span class="hljs-comment"># allkeys-lru     -&gt; 根据 LRU 算法删除任何key</span><br><span class="hljs-comment"># volatile-lfu    -&gt; 根据 LFU 算法删除设置过期时间的key</span><br><span class="hljs-comment"># allkeys-lfu     -&gt; 根据 LFU 算法删除任何key</span><br><span class="hljs-comment"># volatile-random -&gt; 随机移除设置过过期时间的key</span><br><span class="hljs-comment"># allkeys-random  -&gt; 随机移除任何key</span><br><span class="hljs-comment"># volatile-ttl    -&gt; 移除即将过期的key(minor TTL)</span><br><span class="hljs-comment"># noeviction      -&gt; 不移除任何key，只返回一个写错误（默认）</span><br><span class="hljs-comment">#</span><br><span class="hljs-comment"># maxmemory-policy noeviction</span><br><br><span class="hljs-comment"># 删除时 Redis 会检查 5 个key然后取最旧的那个。</span><br><span class="hljs-comment"># 默认值为5，数字越大结果越精确，但会消耗更多CPU。</span><br><span class="hljs-comment"># maxmemory-samples 5</span><br><br><span class="hljs-comment"># 从节点忽略最大内存限制</span><br><span class="hljs-comment"># replica-ignore-maxmemory yes</span><br><br><span class="hljs-comment">############################## APPEND ONLY MODE ###############################</span><br><br><span class="hljs-comment"># 是否开启 AOF 模式，默认no</span><br>appendonly no<br><br><span class="hljs-comment"># AOF 文件名</span><br>appendfilename <span class="hljs-string">&quot;appendonly.aof&quot;</span><br><br><span class="hljs-comment"># 同步策略，数据刷入磁盘的频率：</span><br><span class="hljs-comment">#     no: 不要立刻刷，只有在操作系统需要刷的时候再刷。比较快。</span><br><span class="hljs-comment">#     always: 每次写操作都立刻写入到aof文件。慢，但是最安全。</span><br><span class="hljs-comment">#     everysec: 每秒写一次。折中方案。</span><br><span class="hljs-comment">#</span><br><span class="hljs-comment"># appendfsync always</span><br>appendfsync everysec<br><span class="hljs-comment"># appendfsync no</span><br><br><span class="hljs-comment"># AOF 重写期间是否同步</span><br>no-appendfsync-on-rewrite no<br><br><span class="hljs-comment"># 自动重写AOF文件配置，达到64mb的100%触发重写。</span><br>auto-aof-rewrite-percentage 100<br>auto-aof-rewrite-min-size 64mb<br><br><span class="hljs-comment"># 加载 AOF 文件时出错，是否依然启动，并发送日志通知。</span><br>aof-load-truncated <span class="hljs-built_in">yes</span><br><br><span class="hljs-comment"># RDB AOF 混合持久化</span><br>aof-use-rdb-preamble <span class="hljs-built_in">yes</span><br><br><span class="hljs-comment">################################ LUA SCRIPTING  ###############################</span><br><br><span class="hljs-comment"># LUA 脚本最大执行时间</span><br>lua-time-limit 5000<br><br><span class="hljs-comment">################################ REDIS CLUSTER 集群  ###############################</span><br><br><span class="hljs-comment"># 开启Redis集群功能</span><br><span class="hljs-comment"># cluster-enabled yes</span><br><br><span class="hljs-comment"># Redis自动生成的集群配置文件名，不能重复</span><br><span class="hljs-comment"># cluster-config-file nodes-6379.conf</span><br><br><span class="hljs-comment"># 集群节点超时毫秒数。超时的节点将被视为不可用状态。</span><br><span class="hljs-comment"># cluster-node-timeout 15000</span><br><br><span class="hljs-comment"># 集群选举新master策略：</span><br><span class="hljs-comment">#   (node-timeout * cluster-replica-validity-factor) + repl-ping-replica-period</span><br><span class="hljs-comment">#</span><br><span class="hljs-comment"># cluster-replica-validity-factor 10</span><br><br><span class="hljs-comment"># cluster-migration-barrier 1</span><br><br><span class="hljs-comment"># 默认情况下 Redis 集群只要发现有一个 hash slot 未被覆盖（没有可用的节点为其提供服务）则会停止提供查询服务。</span><br><span class="hljs-comment"># 因此当集群发生部分故障（比如部分的 hash slot 未被覆盖），则会导致整个集群都无法工作。</span><br><span class="hljs-comment"># 当所有的 slots 再次被覆盖后，集群会自动恢复到可用状态。</span><br><span class="hljs-comment"># 如果希望在集群发生故障时可用的部分依然可以提供查询服务，可设置为 no</span><br><span class="hljs-comment"># cluster-require-full-coverage yes</span><br><br><span class="hljs-comment"># master是否进行故障转移，yes不会自动进行故障转移</span><br><span class="hljs-comment"># cluster-replica-no-failover no</span><br><br><span class="hljs-comment"># 当集群节点数达不到最小值时，是否允许客户端读操作</span><br><span class="hljs-comment"># cluster-allow-reads-when-down no</span><br><br><span class="hljs-comment">################################## SLOW LOG 慢查询日志 ###################################</span><br><br><span class="hljs-comment"># 慢查询日志，记录超过多少微秒的查询命令。</span><br><span class="hljs-comment"># 1000000等于1秒，设置为0则记录所有命令。</span><br>slowlog-log-slower-than 10000<br><br><span class="hljs-comment"># 记录大小，可通过SLOWLOG RESET命令重置</span><br>slowlog-max-len 128<br></code></pre></td></tr></table></figure>

      isCollapsedClass: 'tocbot-is-collapsed',
      collapsibleClass: 'tocbot-is-collapsible',
      scrollSmooth    : true,
      includeTitleTags: true,
      headingsOffset  : -boardTop,
    }, CONFIG.toc));
    if (toc.find('.toc-list-item').length > 0) {
      toc.css('visibility', 'visible');
    }

    Fluid.events.registerRefreshCallback(function() {
      if ('tocbot' in window) {
        tocbot.refresh();
        var toc = jQuery('#toc');
        if (toc.length === 0 || !tocbot) {
          return;
        }
        if (toc.find('.toc-list-item').length > 0) {
          toc.css('visibility', 'visible');
        }
      }
    });
  });
</script>

      visible  : CONFIG.anchorjs.visible
    };

      window.anchors.options.icon = CONFIG.anchorjs.icon;
    }
    var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
    var res = [];
    for (var item of el) {
      res.push('.markdown-body > ' + item.trim());
    }
    if (CONFIG.anchorjs.placement === 'left') {
      window.anchors.options.class = 'anchorjs-link-left';
    }
    window.anchors.add(res.join(', '));

    Fluid.events.registerRefreshCallback(function() {
      if ('anchors' in window) {
        anchors.removeAll();
        var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
        var res = [];
        for (var item of el) {
          res.push('.markdown-body > ' + item.trim());
        }
        if (CONFIG.anchorjs.placement === 'left') {
          anchors.options.class = 'anchorjs-link-left';
        }
        anchors.add(res.join(', '));
      }
    });
  });
</script>
